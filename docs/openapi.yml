openapi: 3.1.0
info:
  title: Binkat Oil Cashback API
  description: |
    REST API for the Binkat Oil loyalty and cashback platform.
    
    ## Features
    - **Multi-fuel support**: Petrol (RON 92, RON 95), Diesel, Propane, EV charging
    - **Points system**: Earn and redeem points with tier-based multipliers
    - **Role-based access**: Customer, Operator, Admin roles
    - **Comprehensive analytics**: Customer leaderboards and transaction insights
    - **Localization**: Support for uz-Latn, ru, en with UZS currency
    
    ## Authentication
    Uses JWT Bearer tokens with automatic refresh. Include the token in the Authorization header:
    ```
    Authorization: Bearer <access_token>
    ```
  version: 1.0.0
  contact:
    name: Binkat Oil API Support
    email: api@binkat.uz
  license:
    name: Proprietary
    
servers:
  - url: http://localhost:8080/api/v1
    description: Local development
  - url: https://api.binkat.uz/api/v1
    description: Production server

security:
  - BearerAuth: []

paths:
  # Authentication
  /auth/login:
    post:
      tags: [Authentication]
      summary: Login user
      description: Authenticate user with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /auth/register:
    post:
      tags: [Authentication]
      summary: Register new user
      description: Create a new customer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  
  /auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh access token
      description: Get new access token using refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
              required: [refreshToken]
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Users
  /users/me:
    get:
      tags: [Users]
      summary: Get current user
      description: Get the authenticated user's profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

  # Wallet & Points
  /wallet/balance:
    get:
      tags: [Wallet]
      summary: Get wallet balance
      description: Get current points balance and estimated value
      responses:
        '200':
          description: Wallet balance
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WalletBalance'

  /wallet/ledger:
    get:
      tags: [Wallet]
      summary: Get points ledger
      description: Get paginated points transaction history
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
          description: Pagination cursor for next page
      responses:
        '200':
          description: Points ledger entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LedgerResponse'

  /wallet/redeem-preview:
    post:
      tags: [Wallet]
      summary: Preview redemption
      description: Calculate potential discount for points redemption
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
              required: [transactionId]
      responses:
        '200':
          description: Redemption preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionPreview'

  /wallet/redeem:
    post:
      tags: [Wallet]
      summary: Redeem points
      description: Redeem points for discount on transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RedemptionRequest'
      responses:
        '200':
          description: Redemption successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RedemptionResult'
        '400':
          description: Invalid redemption request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Stations
  /stations:
    get:
      tags: [Stations]
      summary: Get fuel stations
      description: Get list of fuel stations with pumps and current pricing
      parameters:
        - name: active
          in: query
          schema:
            type: boolean
            default: true
          description: Filter by active status
      responses:
        '200':
          description: List of stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Station'

  /stations/{id}:
    get:
      tags: [Stations]
      summary: Get station details
      description: Get detailed information about a specific station
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Station details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Station'
        '404':
          description: Station not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /pricing/current:
    get:
      tags: [Pricing]
      summary: Get current pricing
      description: Get current fuel pricing for station, kind, and grade
      parameters:
        - name: stationId
          in: query
          required: true
          schema:
            type: string
        - name: kind
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/FuelKind'
        - name: grade
          in: query
          schema:
            $ref: '#/components/schemas/PetrolGrade'
          description: Required for PETROL fuel kind
      responses:
        '200':
          description: Current pricing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PricePlan'
        '404':
          description: No pricing found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Refills
  /refills:
    post:
      tags: [Refills]
      summary: Create refill transaction
      description: Process a new fuel refill transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRefillRequest'
      responses:
        '201':
          description: Refill transaction created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefillTransaction'
        '400':
          description: Invalid refill request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    get:
      tags: [Refills]
      summary: Get refill history
      description: Get paginated refill transaction history
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: kind
          in: query
          schema:
            $ref: '#/components/schemas/FuelKind'
        - name: grade
          in: query
          schema:
            $ref: '#/components/schemas/PetrolGrade'
        - name: stationId
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Refill transaction history
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefillHistoryResponse'

  /refills/{id}:
    get:
      tags: [Refills]
      summary: Get refill transaction
      description: Get details of a specific refill transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Refill transaction details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefillTransaction'
        '404':
          description: Transaction not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Admin Analytics
  /admin/analytics/overview:
    get:
      tags: [Admin Analytics]
      summary: Get analytics overview
      description: Get comprehensive analytics overview with KPIs
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: stationId
          in: query
          schema:
            type: array
            items:
              type: string
        - name: kind
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FuelKind'
        - name: grade
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PetrolGrade'
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsOverview'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /admin/analytics/top-customers:
    get:
      tags: [Admin Analytics]
      summary: Get top customers leaderboard
      description: Get top customers by refills or volume with filtering
      security:
        - BearerAuth: []
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: stationId
          in: query
          schema:
            type: array
            items:
              type: string
        - name: kind
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/FuelKind'
        - name: grade
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/PetrolGrade'
        - name: metric
          in: query
          schema:
            type: string
            enum: [REFILLS, VOLUME, SPEND]
            default: REFILLS
        - name: unit
          in: query
          schema:
            type: string
            enum: [AUTO, LITER, KG, KWH]
            default: AUTO
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
        - name: sort
          in: query
          schema:
            type: string
            enum: [ASC, DESC]
            default: DESC
      responses:
        '200':
          description: Top customers leaderboard
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TopCustomersResponse'
        '403':
          description: Admin access required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Enums
    UserRole:
      type: string
      enum: [CUSTOMER, OPERATOR, ADMIN]
    
    TierCode:
      type: string
      enum: [SILVER, GOLD, PLATINUM]
    
    FuelKind:
      type: string
      enum: [PETROL, DIESEL, PROPANE, EV_AC, EV_DC]
    
    PetrolGrade:
      type: string
      enum: [RON_92, RON_95]
      description: Only applicable to PETROL fuel kind
    
    Unit:
      type: string
      enum: [LITER, KG, KWH]
    
    TransactionStatus:
      type: string
      enum: [PENDING, COMPLETED, CANCELLED, FAILED]
    
    PointsReason:
      type: string
      enum: [EARN, REDEEM, ADJUST, EXPIRE]

    # Auth Models
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: customer@binkat.uz
        password:
          type: string
          minLength: 6
          example: securePassword123

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: John Doe
        email:
          type: string
          format: email
          example: customer@binkat.uz
        password:
          type: string
          minLength: 6
          example: securePassword123
        phone:
          type: string
          maxLength: 20
          example: +998901234567
        locale:
          type: string
          enum: [uz-Latn, ru, en]
          default: uz-Latn

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: integer
          description: Access token expiration in seconds
          example: 900

    RefreshResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          description: New refresh token (if rotated)
        expiresIn:
          type: integer

    # User Models
    User:
      type: object
      properties:
        id:
          type: string
          example: "123"
        name:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: customer@binkat.uz
        phone:
          type: string
          example: +998901234567
        locale:
          type: string
          enum: [uz-Latn, ru, en]
          example: uz-Latn
        role:
          $ref: '#/components/schemas/UserRole'
        tier:
          $ref: '#/components/schemas/Tier'
        active:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Tier:
      type: object
      properties:
        id:
          type: string
        code:
          $ref: '#/components/schemas/TierCode'
        name:
          type: string
          example: Silver
        thresholdPoints90d:
          type: number
          format: decimal
          example: 1000.00
        multiplier:
          type: number
          format: decimal
          example: 1.25

    # Wallet Models
    WalletBalance:
      type: object
      properties:
        points:
          type: number
          format: decimal
          example: 2500.00
        estimatedValueUzs:
          type: number
          format: decimal
          example: 25000.00

    PointsLedgerEntry:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        sourceTransactionId:
          type: string
          description: ID of related refill transaction
        deltaPoints:
          type: number
          format: decimal
          example: 150.00
        reason:
          $ref: '#/components/schemas/PointsReason'
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          nullable: true

    LedgerResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/PointsLedgerEntry'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    RedemptionPreview:
      type: object
      properties:
        maxPoints:
          type: number
          format: decimal
          example: 1000.00
        suggestedPoints:
          type: number
          format: decimal
          example: 500.00
        discountUzs:
          type: number
          format: decimal
          example: 5000.00
        redemptionRate:
          type: number
          format: decimal
          example: 10.00

    RedemptionRequest:
      type: object
      required: [transactionId, points]
      properties:
        transactionId:
          type: string
        points:
          type: number
          format: decimal
          minimum: 0
          example: 500.00

    RedemptionResult:
      type: object
      properties:
        success:
          type: boolean
        discountUzs:
          type: number
          format: decimal
        pointsRedeemed:
          type: number
          format: decimal
        transactionId:
          type: string

    # Station Models
    Station:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
          example: Binkat Oil Station #1
        type:
          type: string
          enum: [GAS, PROPANE, EV]
        address:
          type: string
          example: Amir Temur street 15, Tashkent
        latitude:
          type: number
          format: decimal
          example: 41.2995
        longitude:
          type: number
          format: decimal
          example: 69.2401
        active:
          type: boolean
        pumps:
          type: array
          items:
            $ref: '#/components/schemas/PumpOrCharger'
        prices:
          type: array
          items:
            $ref: '#/components/schemas/PricePlan'
        distance:
          type: number
          format: decimal
          description: Distance from user location in kilometers

    PumpOrCharger:
      type: object
      properties:
        id:
          type: string
        stationId:
          type: string
        kind:
          $ref: '#/components/schemas/FuelKind'
        grade:
          allOf:
            - $ref: '#/components/schemas/PetrolGrade'
            - nullable: true
          description: Required for PETROL, null for others
        code:
          type: string
          example: P1-92
        active:
          type: boolean

    PricePlan:
      type: object
      properties:
        id:
          type: string
        stationId:
          type: string
        kind:
          $ref: '#/components/schemas/FuelKind'
        grade:
          allOf:
            - $ref: '#/components/schemas/PetrolGrade'
            - nullable: true
        unit:
          $ref: '#/components/schemas/Unit'
        basePriceUzs:
          type: number
          format: decimal
          example: 12500.00
        effectiveFrom:
          type: string
          format: date-time
        effectiveTo:
          type: string
          format: date-time
          nullable: true

    # Refill Models
    CreateRefillRequest:
      type: object
      required: [stationId, pumpId, kind, unit, quantity, unitPriceUzs]
      properties:
        stationId:
          type: string
        pumpId:
          type: string
        kind:
          $ref: '#/components/schemas/FuelKind'
        grade:
          allOf:
            - $ref: '#/components/schemas/PetrolGrade'
            - nullable: true
          description: Required for PETROL
        unit:
          $ref: '#/components/schemas/Unit'
        quantity:
          type: number
          format: decimal
          minimum: 0
          example: 25.5
        unitPriceUzs:
          type: number
          format: decimal
          minimum: 0
          example: 12500.00
        redeemPoints:
          type: number
          format: decimal
          minimum: 0
          example: 500.00

    RefillTransaction:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        stationId:
          type: string
        pumpId:
          type: string
        kind:
          $ref: '#/components/schemas/FuelKind'
        grade:
          allOf:
            - $ref: '#/components/schemas/PetrolGrade'
            - nullable: true
        unit:
          $ref: '#/components/schemas/Unit'
        quantity:
          type: number
          format: decimal
        unitPriceUzs:
          type: number
          format: decimal
        totalUzs:
          type: number
          format: decimal
        paidUzs:
          type: number
          format: decimal
        pointsEarned:
          type: number
          format: decimal
        pointsRedeemed:
          type: number
          format: decimal
          nullable: true
        discountUzs:
          type: number
          format: decimal
          nullable: true
        status:
          $ref: '#/components/schemas/TransactionStatus'
        occurredAt:
          type: string
          format: date-time
        station:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    RefillHistoryResponse:
      type: object
      properties:
        refills:
          type: array
          items:
            $ref: '#/components/schemas/RefillTransaction'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    # Admin Analytics Models
    AnalyticsOverview:
      type: object
      properties:
        totals:
          type: object
          properties:
            refills:
              type: integer
              example: 5420
            revenueUzs:
              type: number
              format: decimal
              example: 157000000.00
            pointsIssued:
              type: number
              format: decimal
              example: 125000.00
            pointsRedeemed:
              type: number
              format: decimal
              example: 45000.00
            redemptionRatePct:
              type: number
              format: decimal
              example: 36.0
        volume:
          type: object
          properties:
            petrol92Liters:
              type: number
              format: decimal
              example: 15000.5
            petrol95Liters:
              type: number
              format: decimal
              example: 8500.2
            dieselLiters:
              type: number
              format: decimal
              example: 25000.8
            propaneLitersOrKg:
              type: number
              format: decimal
              example: 5000.0
            evKwh:
              type: number
              format: decimal
              example: 12000.5
        activeCustomers:
          type: integer
          example: 1250

    TopCustomersResponse:
      type: object
      properties:
        customers:
          type: array
          items:
            $ref: '#/components/schemas/TopCustomer'
        nextCursor:
          type: string
          nullable: true
        hasMore:
          type: boolean

    TopCustomer:
      type: object
      properties:
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            phoneMasked:
              type: string
              example: +998 XX *** ** **
            tier:
              $ref: '#/components/schemas/Tier'
        stationsUsed:
          type: integer
          example: 3
        refills:
          type: integer
          example: 45
        volume:
          type: object
          properties:
            value:
              type: number
              format: decimal
              example: 1250.5
            unit:
              type: string
              enum: [LITER, KG, KWH]
        spendUzs:
          type: number
          format: decimal
          example: 15750000.00
        points:
          type: object
          properties:
            earned:
              type: number
              format: decimal
              example: 15750.00
            redeemed:
              type: number
              format: decimal
              example: 5000.00
        lastActivityAt:
          type: string
          format: date-time

    # Error Response
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid request
        message:
          type: string
          example: Detailed error message
        code:
          type: string
          example: VALIDATION_ERROR
        timestamp:
          type: string
          format: date-time
        path:
          type: string
          example: /api/v1/auth/login

tags:
  - name: Authentication
    description: User authentication and token management
  - name: Users
    description: User profile management
  - name: Wallet
    description: Points wallet and redemption
  - name: Stations
    description: Fuel station information
  - name: Pricing
    description: Dynamic fuel pricing
  - name: Refills
    description: Fuel refill transactions
  - name: Admin Analytics
    description: Administrative analytics and reporting